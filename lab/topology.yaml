# Seam Platform — E2E Lab Topology Declaration
# ─────────────────────────────────────────────────────────────────────────────
# This file is the authoritative reference for the Seam lab setup session.
# It is documentation only — it does not execute anything.
#
# Lab Operator reads this file to produce the exact provisioning sequence.
# All QEMU VM names, IPs, and port requirements are declared here.
#
# Constraint from CLAUDE.md §9:
#   Max 10 VMs total. Never run ccs-dev and ccs-test simultaneously.
#   This topology uses ccs-test (5 VMs) + ccs-mgmt (5 VMs) = 10 VMs total.
#   ccs-dev is mutually exclusive with ccs-test.
# ─────────────────────────────────────────────────────────────────────────────

talosVersion: "1.12.6"
kubernetesVersion: "1.32.x"

# ─── Cilium Machine Config Requirements ──────────────────────────────────────
# Every node's machine config MUST include these kernel modules and sysctls for
# Cilium native routing to function. Must be patched in before first boot.
# See compile.go ClusterInput comment and lab/CLAUDE.md §Cilium for full rationale.
#
#   machine.kernel.modules:
#     - name: br_netfilter
#     - name: xt_socket
#
#   machine.sysctls:
#     net.ipv4.conf.all.rp_filter:     "0"
#     net.ipv4.conf.default.rp_filter: "0"
#
# Without these, Cilium installs but pod-to-pod routing silently drops packets.

# ─── Host Bridge Network ──────────────────────────────────────────────────────
network:
  bridge: talos-br0
  subnet: 10.20.0.0/24
  gateway: 10.20.0.1
  hostAddress: 10.20.0.1

# ─── Shared Registry ─────────────────────────────────────────────────────────
registry:
  # Plain HTTP. Accessible from both clusters via host bridge network.
  # Lab tags are pushed here only — never to the public registry. INV-011.
  address: 10.20.0.1:5000
  localAlias: localhost:5000
  # For e2e tests running on the host: use localhost:5000
  # For Conductor/Platform/Wrapper running in-cluster: use 10.20.0.1:5000

# ─── Chart Server (Helm repository for local chart caching) ──────────────────
chartServer:
  address: 10.20.0.1:8888

# ─── Port Requirements ────────────────────────────────────────────────────────
# These ports must be reachable from the host to all node IPs.
portRequirements:
  - port: 50000
    protocol: TCP
    purpose: "Talos apid — machineconfig delivery (SeamInfrastructureProvider, CP-INV-001)"
    direction: host-to-node
    required: true
  - port: 6443
    protocol: TCP
    purpose: "Kubernetes API server"
    direction: host-to-node
    required: true
  - port: 50051
    protocol: TCP
    purpose: "Conductor PermissionService gRPC (local cluster only)"
    direction: in-cluster
    required: false  # in-cluster only; not host-to-node

# ─── Clusters ────────────────────────────────────────────────────────────────
clusters:

  # ── Management Cluster: ccs-mgmt ──────────────────────────────────────────
  - name: ccs-mgmt
    role: management
    virtualIP: 10.20.0.10
    # Management cluster is NOT CAPI-managed. Bootstrap path:
    #   compiler bootstrap → machineconfigs → etcd init → enable phase.
    # See platform-schema.md §3.
    nodes:
      - vmName: ccs-mgmt-cp-01
        role: controlplane
        ip: 10.20.0.11
        disk: /dev/vda
        # QEMU disk settings per CLAUDE.md §9:
        # cache=none, io=native, iothread=1, memballoon=none
        diskOptions:
          cache: none
          io: native
          iothread: 1
          memballoon: false
        memory: 4096     # MB
        vcpus: 2

      - vmName: ccs-mgmt-cp-02
        role: controlplane
        ip: 10.20.0.12
        disk: /dev/vda
        diskOptions:
          cache: none
          io: native
          iothread: 1
          memballoon: false
        memory: 4096
        vcpus: 2

      - vmName: ccs-mgmt-cp-03
        role: controlplane
        ip: 10.20.0.13
        disk: /dev/vda
        diskOptions:
          cache: none
          io: native
          iothread: 1
          memballoon: false
        memory: 4096
        vcpus: 2

      - vmName: ccs-mgmt-wk-01
        role: worker
        ip: 10.20.0.14
        disk: /dev/vda
        diskOptions:
          cache: none
          io: native
          iothread: 1
          memballoon: false
        memory: 8192
        vcpus: 4

      - vmName: ccs-mgmt-wk-02
        role: worker
        ip: 10.20.0.15
        disk: /dev/vda
        diskOptions:
          cache: none
          io: native
          iothread: 1
          memballoon: false
        memory: 8192
        vcpus: 4

    bootstrapSequence:
      # Ordered steps referencing compiler subcommands. Each step is a precondition
      # for the next. Lab Operator executes these in order using the Compiler image
      # from 10.20.0.1:5000/ontai-dev/compiler:dev.
      - step: 1
        name: compiler-bootstrap
        description: >
          Generate Talos machineconfigs and TalosCluster CR YAML for ccs-mgmt.
          Produces: machineconfigs per node (seam-mc-ccs-mgmt-{hostname}),
          bootstrap-sequence.yaml, TalosCluster CR YAML.
        command: "compiler bootstrap --cluster ccs-mgmt --output /out/bootstrap/"
        prereqs: []

      - step: 2
        name: apply-machineconfigs
        description: >
          Apply generated machineconfigs to seed nodes on port 50000 using
          talosctl (or talos goclient equivalent). Nodes must be booted from
          Talos ISO and reachable on their declared IPs.
        command: >
          for each node: talosctl apply-config --insecure
          --nodes {ip} --file /out/bootstrap/seam-mc-ccs-mgmt-{hostname}.yaml
        prereqs:
          - "All 5 VMs booted from Talos ISO and reachable on port 50000"
          - "compiler-bootstrap complete"

      - step: 3
        name: bootstrap-etcd
        description: >
          Bootstrap etcd on the first control plane node. Only run once per cluster.
          After this step, the Kubernetes API server becomes available.
        command: "talosctl bootstrap --nodes 10.20.0.11 --talosconfig /out/bootstrap/talosconfig"
        prereqs:
          - "apply-machineconfigs complete on all nodes"

      - step: 4
        name: retrieve-kubeconfig
        description: >
          Retrieve the Kubernetes API kubeconfig for ccs-mgmt.
          Store at ~/.kube/ccs-mgmt.yaml (or $KUBECONFIG).
        command: >
          talosctl kubeconfig --nodes 10.20.0.11
          --talosconfig /out/bootstrap/talosconfig
          --force-context-name ccs-mgmt
          /out/bootstrap/ccs-mgmt.yaml
        prereqs:
          - "bootstrap-etcd complete"
          - "Kubernetes API reachable on 10.20.0.10:6443"

      - step: 5
        name: compiler-launch
        description: >
          Generate the CRD bundle for the management cluster.
          Produces: crds.yaml containing all 5 operator CRDs.
        command: "compiler launch --cluster ccs-mgmt --output /out/launch/"
        prereqs:
          - "retrieve-kubeconfig complete"

      - step: 6
        name: apply-crds
        description: >
          Apply crds.yaml to the management cluster.
          All Seam CRDs must exist before operators start.
        command: "kubectl apply -f /out/launch/crds.yaml --kubeconfig /out/bootstrap/ccs-mgmt.yaml"
        prereqs:
          - "compiler-launch complete"

      - step: 7
        name: compiler-enable
        description: >
          Generate the full enable bundle for the management cluster.
          Produces: 5 phased subdirectories (01-guardian-bootstrap through
          05-post-bootstrap) per conductor-schema.md §15 / session/35.
        command: "compiler enable --cluster ccs-mgmt --output /out/enable/"
        prereqs:
          - "apply-crds complete"

      - step: 8
        name: apply-enable-phases
        description: >
          Apply each phase directory in order. Phase 1 (01-guardian-bootstrap)
          stamps namespace-labels and guardian bootstrap RBAC. Wait for guardian
          webhook readiness between phase 2 and phase 3.
        command: >
          kubectl apply -f /out/enable/01-guardian-bootstrap/ --kubeconfig ...
          # Wait for guardian webhook: condition RBACProfile provisioned=true
          kubectl apply -f /out/enable/02-guardian-deploy/ --kubeconfig ...
          kubectl apply -f /out/enable/03-platform-wrapper/ --kubeconfig ...
          kubectl apply -f /out/enable/04-conductor/ --kubeconfig ...
          kubectl apply -f /out/enable/05-post-bootstrap/ --kubeconfig ...
        prereqs:
          - "compiler-enable complete"
          - "Cilium ClusterPack compiled and pushed to registry"

  # ── Target Cluster: ccs-test ──────────────────────────────────────────────
  - name: ccs-test
    role: target
    # Target clusters are CAPI-managed. TalosCluster CR on the management cluster
    # drives the full lifecycle via SeamInfrastructureProvider. platform-schema.md §2.
    # ccs-test is mutually exclusive with ccs-dev. Max 10 VMs total.
    nodes:
      - vmName: ccs-test-cp-01
        role: controlplane
        ip: 10.20.0.21
        disk: /dev/vda
        diskOptions:
          cache: none
          io: native
          iothread: 1
          memballoon: false
        memory: 4096
        vcpus: 2

      - vmName: ccs-test-cp-02
        role: controlplane
        ip: 10.20.0.22
        disk: /dev/vda
        diskOptions:
          cache: none
          io: native
          iothread: 1
          memballoon: false
        memory: 4096
        vcpus: 2

      - vmName: ccs-test-cp-03
        role: controlplane
        ip: 10.20.0.23
        disk: /dev/vda
        diskOptions:
          cache: none
          io: native
          iothread: 1
          memballoon: false
        memory: 4096
        vcpus: 2

      - vmName: ccs-test-wk-01
        role: worker
        ip: 10.20.0.24
        disk: /dev/vda
        diskOptions:
          cache: none
          io: native
          iothread: 1
          memballoon: false
        memory: 8192
        vcpus: 4

      - vmName: ccs-test-wk-02
        role: worker
        ip: 10.20.0.25
        disk: /dev/vda
        diskOptions:
          cache: none
          io: native
          iothread: 1
          memballoon: false
        memory: 8192
        vcpus: 4

    bootstrapSequence:
      # ccs-test is provisioned via TalosCluster CR on ccs-mgmt, not by compiler bootstrap.
      # The SeamInfrastructureProvider delivers machineconfigs to nodes via CAPI.
      # Platform-schema.md §2. Nodes must be booted from Talos ISO before CRs are applied.
      - step: 1
        name: boot-nodes
        description: >
          Boot all 5 ccs-test VMs from Talos ISO. Nodes must be in maintenance mode,
          reachable on port 50000 from ccs-mgmt (via host bridge routing).
        prereqs:
          - "ccs-mgmt fully operational with all operators running"
          - "Seam Infrastructure Provider running in seam-system on ccs-mgmt"

      - step: 2
        name: apply-seaminfrastructuremachine-crs
        description: >
          Apply SeamInfrastructureMachine CRs (one per node) to
          seam-tenant-ccs-test on ccs-mgmt. Each declares the pre-provisioned
          IP on port 50000 and the nodeRole. platform-schema.md §4.
        command: "kubectl apply -f ccs-test-sim-manifests/ --kubeconfig /out/bootstrap/ccs-mgmt.yaml"
        prereqs:
          - "boot-nodes complete"
          - "seam-tenant-ccs-test namespace exists on ccs-mgmt"

      - step: 3
        name: apply-taloscluster-cr
        description: >
          Apply the TalosCluster CR for ccs-test to the management cluster.
          Platform reconciler creates CAPI objects. SeamInfrastructureProvider
          delivers machineconfigs on port 50000 once CABPT renders them.
        command: "kubectl apply -f ccs-test-taloscluster.yaml --kubeconfig /out/bootstrap/ccs-mgmt.yaml"
        prereqs:
          - "apply-seaminfrastructuremachine-crs complete"

      - step: 4
        name: wait-taloscluster-ready
        description: >
          Wait for TalosCluster status to reach Ready=True on ccs-mgmt.
          Includes: CAPI Cluster Running, all Machines Running, ConductorReady=True.
          platform-schema.md §2, session/36 WS1.
        prereqs:
          - "apply-taloscluster-cr complete"

      - step: 5
        name: retrieve-tenant-kubeconfig
        description: >
          Retrieve the ccs-test kubeconfig from the CAPI-generated Secret in
          seam-tenant-ccs-test on ccs-mgmt. Store at ~/.kube/ccs-test.yaml.
        command: >
          kubectl get secret ccs-test-kubeconfig -n seam-tenant-ccs-test
          --kubeconfig /out/bootstrap/ccs-mgmt.yaml
          -o jsonpath='{.data.value}' | base64 -d > /out/ccs-test.yaml
        prereqs:
          - "wait-taloscluster-ready complete"
