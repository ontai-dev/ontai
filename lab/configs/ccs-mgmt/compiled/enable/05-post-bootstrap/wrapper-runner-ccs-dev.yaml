# wrapper-runner RBAC in seam-tenant-ccs-dev
# ServiceAccount, Role, RoleBinding for pack-deploy Job identity.
# ClusterRoleBinding for cluster-scoped bucket 2 resources (ClusterRole shared).
# Annotations ontai.dev/rbac-owner=guardian: Guardian governs after bootstrap.
# wrapper-schema.md §4 §9, guardian-schema.md §6, INV-004.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/component: runner
    app.kubernetes.io/name: wrapper
    ontai.dev/managed-by: compiler
  name: wrapper-runner
  namespace: seam-tenant-ccs-dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  annotations:
    ontai.dev/rbac-owner: guardian
  labels:
    app.kubernetes.io/component: runner
    app.kubernetes.io/name: wrapper
    ontai.dev/managed-by: compiler
  name: wrapper-runner
  namespace: seam-tenant-ccs-dev
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - secrets
  - serviceaccounts
  - services
  - persistentvolumeclaims
  - endpoints
  - pods
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - apps
  resources:
  - deployments
  - daemonsets
  - statefulsets
  - replicasets
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - networking.k8s.io
  resources:
  - ingresses
  - ingressclasses
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - batch
  resources:
  - jobs
  - cronjobs
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - autoscaling
  resources:
  - horizontalpodautoscalers
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - infrastructure.ontai.dev
  resources:
  - infrastructurepackexecutions
  - infrastructureclusterpacks
  - infrastructurepackinstances
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - infrastructure.ontai.dev
  resources:
  - infrastructurerunnerconfigs
  verbs:
  - get
  - list
  - watch
  - patch
  - update
- apiGroups:
  - security.ontai.dev
  resources:
  - rbacprofiles
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - infrastructure.ontai.dev
  resources:
  - packoperationresults
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  annotations:
    ontai.dev/rbac-owner: guardian
  labels:
    app.kubernetes.io/component: runner
    app.kubernetes.io/name: wrapper
    ontai.dev/managed-by: compiler
  name: wrapper-runner
  namespace: seam-tenant-ccs-dev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: wrapper-runner
subjects:
- kind: ServiceAccount
  name: wrapper-runner
  namespace: seam-tenant-ccs-dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  annotations:
    ontai.dev/rbac-owner: guardian
  labels:
    app.kubernetes.io/component: runner
    app.kubernetes.io/name: wrapper
    ontai.dev/managed-by: compiler
  name: wrapper-runner-cluster-scoped-ccs-dev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: wrapper-runner-cluster-scoped
subjects:
- kind: ServiceAccount
  name: wrapper-runner
  namespace: seam-tenant-ccs-dev
