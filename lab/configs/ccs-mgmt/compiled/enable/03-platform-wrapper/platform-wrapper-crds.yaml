                    type: string
                  rootName:
                    description: RootName is the name of the root declaration.
                    type: string
                  rootNamespace:
                    description: RootNamespace is the namespace of the root declaration.
                    type: string
                  rootUID:
                    description: |-
                      RootUID is the UID of the root declaration at the time this object was
                      created. Used to verify that no root declaration replacement has occurred.
                    type: string
                required:
                - creatingOperator
                - creationRationale
                - rootGenerationAtCreation
                - rootKind
                - rootName
                - rootNamespace
                - rootUID
                type: object
              mode:
                allOf:
                - enum:
                  - bootstrap
                  - import
                - enum:
                  - bootstrap
                  - import
                description: Mode declares whether this cluster is bootstrapped from
                  scratch or imported.
                type: string
              nodeAddresses:
                description: |-
                  NodeAddresses is the list of node IPs belonging to this cluster. Used by
                  DSNSReconciler to populate A records in the seam DNS zone. platform-schema.md §5.
                items:
                  type: string
                type: array
              role:
                allOf:
                - enum:
                  - management
                  - tenant
                - enum:
                  - management
                  - tenant
                description: Role declares the cluster role in the Seam topology.
                  Mandatory on mode=import.
                type: string
              talosVersion:
                description: |-
                  TalosVersion is the Talos OS version for this cluster. Used by Conductor to select
                  a compatible runner image. INV-012.
                type: string
              talosconfigSecretRef:
                description: TalosconfigSecretRef is the name of the Secret containing
                  the talosconfig for this cluster.
                type: string
            required:
            - mode
            type: object
          status:
            description: InfrastructureTalosClusterStatus is the observed state of
              an InfrastructureTalosCluster.
            properties:
              capiClusterRef:
                description: |-
                  CAPIClusterRef is a reference to the owned CAPI Cluster object in the tenant
                  namespace. Only set for CAPI-managed clusters (capi.enabled=true).
                properties:
                  name:
                    description: Name is the object name.
                    type: string
                  namespace:
                    description: Namespace is the object namespace. May be empty for
                      cluster-scoped objects.
                    type: string
                required:
                - name
                type: object
              conditions:
                description: Conditions is the list of status conditions for this
                  TalosCluster.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                description: ObservedGeneration is the generation most recently reconciled.
                format: int64
                type: integer
              origin:
                description: Origin records how this cluster came under Seam governance.
                enum:
                - bootstrapped
                - imported
                type: string
            type: object
        type: object
