# Bootstrap PermissionSet CRs
# Generated by: compiler enable (phase 1 guardian-bootstrap)
# One PermissionSet per Seam operator plus seam-bootstrap-ceiling (the RBACPolicy ceiling).
# All sets grant full access during the bootstrap window.
# Tighten permissions post-bootstrap to least-privilege. guardian-schema.md §6.
---
apiVersion: security.ontai.dev/v1alpha1
kind: PermissionSet
metadata:
  labels:
    ontai.dev/managed-by: compiler
    ontai.dev/permission-set-type: bootstrap
  name: seam-bootstrap-ceiling
  namespace: seam-system
spec:
  permissions:
  - apiGroups:
    - '*'
    resources:
    - '*'
    verbs:
    - get
    - list
    - watch
    - create
    - update
    - patch
    - delete
