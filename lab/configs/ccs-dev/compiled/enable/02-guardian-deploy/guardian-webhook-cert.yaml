# Guardian Webhook TLS Certificate
# Generated for: ccs-dev guardian-tenant enable (phase 2 guardian-deploy)
# cert-manager Certificate CR -- signed by guardian-ca-issuer (Issuer in ont-system).
# Provisions guardian-webhook-cert Secret mounted at
# /tmp/k8s-webhook-server/serving-certs in the Guardian Deployment.
# Prerequisite: phase 1 must be applied and guardian-ca-issuer must be Ready.
# guardian-schema.md §3.
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  labels:
    app.kubernetes.io/component: webhook
    app.kubernetes.io/name: guardian
    ontai.dev/managed-by: compiler
  name: guardian-webhook-cert
  namespace: ont-system
spec:
  dnsNames:
  - guardian.ont-system.svc
  - guardian.ont-system.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: guardian-ca-issuer
  secretName: guardian-webhook-cert
