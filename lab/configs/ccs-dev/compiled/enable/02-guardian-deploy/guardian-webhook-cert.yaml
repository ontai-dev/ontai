# Guardian Webhook TLS Certificate
# Generated by: compiler enable (phase 2 guardian-deploy)
# cert-manager Certificate CR — signed by guardian-ca-issuer (namespaced Issuer in seam-system).
# Provisions guardian-webhook-cert Secret mounted at
# /tmp/k8s-webhook-server/serving-certs in the Guardian Deployment.
# Prerequisite: cert-manager must be running and guardian-ca-issuer must exist.
# guardian-schema.md §3.
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  labels:
    app.kubernetes.io/component: webhook
    app.kubernetes.io/name: guardian
    ontai.dev/managed-by: compiler
  name: guardian-webhook-cert
  namespace: seam-system
spec:
  dnsNames:
  - guardian.seam-system.svc
  - guardian.seam-system.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: guardian-ca-issuer
  secretName: guardian-webhook-cert
