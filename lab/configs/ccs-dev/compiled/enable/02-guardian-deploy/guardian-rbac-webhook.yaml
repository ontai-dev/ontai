# Guardian RBAC ValidatingWebhookConfiguration
# Generated by: compiler enable (phase 2 guardian-deploy)
# Gates all RBAC writes in non-exempt namespaces.
# Exempt namespaces carry seam.ontai.dev/webhook-mode=exempt label.
# caBundle injected by cert-manager CA injector via cert-manager.io/inject-ca-from annotation.
# guardian-schema.md §5. CS-INV-001.
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  annotations:
    cert-manager.io/inject-ca-from: seam-system/guardian-webhook-cert
    ontai.dev/managed-by: compiler
  name: guardian-rbac-webhook
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: guardian
      namespace: seam-system
      path: /validate-rbac
      port: 443
  failurePolicy: Fail
  name: validate-rbac.security.ontai.dev
  namespaceSelector:
    matchExpressions:
    - key: seam.ontai.dev/webhook-mode
      operator: NotIn
      values:
      - exempt
  rules:
  - apiGroups:
    - rbac.authorization.k8s.io
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - roles
    - clusterroles
    - rolebindings
    - clusterrolebindings
    scope: '*'
  - apiGroups:
    - ""
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - serviceaccounts
    scope: '*'
  sideEffects: None
