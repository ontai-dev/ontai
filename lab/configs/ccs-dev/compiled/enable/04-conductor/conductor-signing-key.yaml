# Conductor Ed25519 signing key Secret — generated by compiler enable.
# Private key: PKCS8 PEM. Public key: PKIX PEM.
# Mounted at /etc/conductor/signing in the Conductor Deployment.
# Rotate: re-run compiler enable and restart the Conductor Deployment.
# WARNING: generated fresh each compiler enable run — store in GitOps after first enable.
# INV-026, conductor-schema.md §15.
---
apiVersion: v1
kind: Secret
metadata:
  annotations:
    ontai.dev/rotate-via: compiler enable
  labels:
    app.kubernetes.io/component: signing
    app.kubernetes.io/name: conductor
    ontai.dev/managed-by: compiler
  name: conductor-signing-key
  namespace: ont-system
stringData:
  private.pem: |
    -----BEGIN PRIVATE KEY-----
    MC4CAQAwBQYDK2VwBCIEIJ5FO1S2eh1lW+Z4QiMys8Udi6vi7aHKre4xfM2jRbov
    -----END PRIVATE KEY-----
  public.pem: |
    -----BEGIN PUBLIC KEY-----
    MCowBQYDK2VwAyEAU7/Qofe0fHrG+/PwXTH1aUYWlv8JpaVSEMNfeMgjPok=
    -----END PUBLIC KEY-----
