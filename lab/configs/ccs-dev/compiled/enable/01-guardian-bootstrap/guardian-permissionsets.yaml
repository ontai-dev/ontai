# Bootstrap PermissionSet CRs
# Generated by: compiler enable (phase 1 guardian-bootstrap)
# management-maximum is the Layer 1 fleet ceiling (guardian-schema.md §19 Layer 1).
# CS-INV-008: exactly one PermissionSet at Layer 1. All Seam operator RBACProfiles
# reference management-maximum directly. No per-operator PermissionSets are emitted.
---
apiVersion: security.ontai.dev/v1alpha1
kind: PermissionSet
metadata:
  labels:
    ontai.dev/managed-by: compiler
    ontai.dev/permission-set-type: bootstrap
    ontai.dev/policy-type: management
  name: management-maximum
  namespace: seam-system
spec:
  description: Fleet permission ceiling -- Layer 1 of three-layer RBAC hierarchy
  permissions:
  - apiGroups:
    - '*'
    resources:
    - '*'
    verbs:
    - get
    - list
    - watch
    - create
    - update
    - patch
    - delete
