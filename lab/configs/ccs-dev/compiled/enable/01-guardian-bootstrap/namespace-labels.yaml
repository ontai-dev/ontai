# Namespace webhook-mode label patches
# Generated for: ccs-dev guardian-tenant enable (phase 1 guardian-bootstrap)
#
# Apply with: kubectl apply --server-side --field-manager=compiler-enable
#
# Guardian's CheckBootstrapLabels gate requires the operator namespace (ont-system)
# to carry seam.ontai.dev/webhook-mode=exempt before the admission webhook registers.
# System and component namespaces also get exempt to prevent guardian blocking
# its own bootstrap sweep. guardian-schema.md §4, INV-020, CS-INV-004.
