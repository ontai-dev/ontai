  labels:
    seam.ontai.dev/webhook-mode: exempt
  name: kube-system
---
apiVersion: v1
kind: Namespace
metadata:
  labels:
    seam.ontai.dev/webhook-mode: exempt
  name: seam-system
---
apiVersion: v1
