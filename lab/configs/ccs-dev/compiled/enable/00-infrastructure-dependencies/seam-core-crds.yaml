                        Secret, OCIImage, S3Object.'
                      enum:
                      - ConfigMap
                      - Secret
                      - OCIImage
                      - S3Object
                      type: string
                    name:
                      description: Name is a logical identifier for this artifact.
                      type: string
                    reference:
                      description: Reference is the fully qualified reference for
                        the artifact kind.
                      type: string
                  required:
                  - kind
                  - name
                  - reference
                  type: object
                type: array
              capability:
                description: Capability is the name of the Conductor capability that
                  produced this result.
                type: string
              clusterPackRef:
                description: ClusterPackRef is the name of the ClusterPack CR that
                  was deployed.
                type: string
              completedAt:
                description: CompletedAt is the time the capability execution finished.
                format: date-time
                type: string
              deployedResources:
