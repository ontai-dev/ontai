apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.1
  name: infrastructuretalosclusteroperationresults.infrastructure.ontai.dev
spec:
  group: infrastructure.ontai.dev
  names:
    kind: InfrastructureTalosClusterOperationResult
    listKind: InfrastructureTalosClusterOperationResultList
    plural: infrastructuretalosclusteroperationresults
    shortNames:
    - tcor
    singular: infrastructuretalosclusteroperationresult
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.clusterRef
      name: Cluster
      type: string
    - jsonPath: .spec.talosVersion
      name: TalosVersion
      type: string
    - jsonPath: .spec.revision
      name: Revision
      type: integer
    - jsonPath: .spec.operations
      name: Ops
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          InfrastructureTalosClusterOperationResult accumulates the day-2 operation history
          for one cluster. One CR per cluster, created when the platform operator provisions
          the cluster tenant namespace. Operations are appended by the Conductor execute-mode
          Job. On talosVersion upgrade, the current revision is archived to the GraphQuery DB
          and a new revision epoch begins.

          Named by the cluster name. Lives in seam-tenant-{clusterRef}.
          conductor-schema.md §8, seam-core-schema.md §TCOR.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              InfrastructureTalosClusterOperationResultSpec is the accumulated day-2 operation
              history for one cluster, scoped to the current talosVersion revision.

              One CR per cluster. Created by the platform operator when the cluster tenant
              namespace is provisioned. Named by the cluster name. Lives in seam-tenant-{clusterRef}.

              When the cluster talosVersion is upgraded, the current revision is archived to
              the GraphQuery DB and a new revision begins: Revision increments, TalosVersion
              is updated, and Operations is cleared.

              conductor-schema.md §8, seam-core-schema.md §TCOR.
            properties:
              clusterRef:
                description: ClusterRef is the name of the InfrastructureTalosCluster
                  this result accumulates.
                type: string
              operations:
                additionalProperties:
                  description: |-
                    TalosClusterOperationRecord is a single day-2 operation record within one
                    talosVersion revision. Multiple records accumulate in the parent TCOR as
                    operations are performed against the cluster.
                  properties:
                    capability:
                      description: Capability is the conductor capability that produced
                        this record.
                      type: string
                    completedAt:
                      description: CompletedAt is the time the capability execution
                        finished.
                      format: date-time
                      type: string
                    failureReason:
                      description: FailureReason is populated when Status is Failed.
                        Nil on success.
                      properties:
                        category:
                          description: Category classifies the failure domain.
                          enum:
                          - ValidationFailure
                          - CapabilityUnavailable
                          - ExecutionFailure
                          - ExternalDependencyFailure
                          - InvariantViolation
                          type: string
                        reason:
                          description: Reason is a human-readable description of the
                            failure.
                          type: string
                      required:
                      - category
                      - reason
                      type: object
                    jobRef:
                      description: |-
                        JobRef is the Kubernetes Job name that produced this record.
                        The platform reconciler uses this to correlate the record with the Job it submitted.
                      type: string
                    message:
                      description: Message provides a human-readable summary of the
                        outcome.
                      type: string
                    startedAt:
                      description: StartedAt is the time the capability execution
                        began.
                      format: date-time
                      type: string
                    status:
                      allOf:
                      - enum:
                        - Succeeded
                        - Failed
                      - enum:
                        - Succeeded
                        - Failed
                      description: Status is the terminal status of the capability
                        execution.
                      type: string
                  required:
                  - capability
                  - jobRef
                  - status
                  type: object
                description: |-
                  Operations is the map of day-2 operation records for the current revision,
                  keyed by Kubernetes Job name (OPERATION_RESULT_CR). Map keying enables
                  O(1) lookup by the platform reconciler and clean serialization when
                  archiving the revision to the GraphQuery DB.
                type: object
              revision:
                default: 1
                description: |-
                  Revision is the monotonic revision counter. Starts at 1. Increments on each
                  talosVersion upgrade. Each revision holds the operations performed during that
                  version epoch. Archived revisions are stored in the GraphQuery DB.
                format: int64
                type: integer
              talosVersion:
                description: |-
                  TalosVersion is the cluster talosVersion for the current active revision.
                  Matches InfrastructureTalosCluster.spec.talosVersion at the time this revision began.
                type: string
            required:
            - clusterRef
            - revision
            - talosVersion
            type: object
          status:
            description: |-
              InfrastructureTalosClusterOperationResultStatus is the observed state.
              Currently empty; reserved for future conditions.
            properties:
              observedGeneration:
                description: ObservedGeneration is the last generation observed by
                  any consumer.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.1
  name: infrastructuretalosclusters.infrastructure.ontai.dev
spec:
  group: infrastructure.ontai.dev
  names:
    kind: InfrastructureTalosCluster
    listKind: InfrastructureTalosClusterList
    plural: infrastructuretalosclusters
    shortNames:
    - itc
    singular: infrastructuretaloscluster
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.mode
      name: Mode
      type: string
    - jsonPath: .spec.role
      name: Role
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          InfrastructureTalosCluster is the seam-core CRD for a Talos cluster under Seam governance.
          platform-schema.md §4. Decision H.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              InfrastructureTalosClusterSpec is the declared desired state of an InfrastructureTalosCluster.
              platform-schema.md §4.
            properties:
              capi:
                description: CAPI holds CAPI integration settings. When absent, the
                  cluster uses direct bootstrap.
                properties:
                  ciliumPackRef:
                    description: |-
                      CiliumPackRef references the cluster-specific Cilium ClusterPack.
                      Applied as the first pack after the CAPI cluster reaches Running state.
                      Required when Enabled=true. platform-schema.md §2.3.
                    properties:
                      name:
                        description: Name is the ClusterPack CR name for the Cilium
                          pack.
                        type: string
                      version:
                        description: Version is the ClusterPack version string.
                        type: string
                    required:
                    - name
                    - version
                    type: object
                  controlPlane:
                    description: ControlPlane holds control plane configuration. Required
                      when Enabled=true.
                    properties:
                      replicas:
                        description: Replicas is the desired number of control plane
                          nodes.
                        format: int32
                        type: integer
                    type: object
                  enabled:
                    description: |-
                      Enabled determines whether this TalosCluster uses the CAPI path.
                      True for all target clusters. False for the management cluster.
                    type: boolean
                  kubernetesVersion:
                    description: |-
                      KubernetesVersion is the Kubernetes version for TalosControlPlane.
                      Required when Enabled=true.
                    type: string
                  talosVersion:
                    description: |-
                      TalosVersion is the Talos version to use for TalosConfigTemplate and
                      CABPT machineconfig generation. Required when Enabled=true.
                    type: string
                  workers:
                    description: Workers is the list of worker node pools.
                    items:
                      description: |-
                        InfrastructureCAPIWorkerPool declares a worker node pool for a CAPI-managed target cluster.
                        Each pool maps to a MachineDeployment + SeamInfrastructureMachineTemplate.
                      properties:
                        name:
                          description: Name is the pool identifier. Used as the MachineDeployment
                            name suffix.
                          type: string
                        replicas:
                          description: Replicas is the desired number of worker nodes
                            in this pool.
                          format: int32
                          type: integer
                        seamInfrastructureMachineNames:
                          description: |-
                            SeamInfrastructureMachineNames lists the SeamInfrastructureMachine CR names
                            pre-provisioned for this pool. One per node.
                          items:
                            type: string
                          type: array
                      required:
                      - name
                      type: object
                    type: array
                required:
                - enabled
                type: object
              clusterEndpoint:
                description: |-
                  ClusterEndpoint is the cluster VIP or primary API endpoint IP. Required on mode=import.
                  Optional for bootstrap mode (endpoint derived from bootstrap Job output).
                type: string
              infrastructureProvider:
                allOf:
                - enum:
                  - native
                  - capi
                  - screen
                - enum:
                  - native
                  - capi
                  - screen
                default: native
                description: |-
                  InfrastructureProvider declares the infrastructure provider backing this cluster.
                  Defaults to native when absent. The only reserved future value is screen (INV-021).
                type: string
              kubeconfigSecretRef:
                description: |-
                  KubeconfigSecretRef is the name of the Secret containing the kubeconfig for this cluster.
                  Required on mode=import. Not used when CAPI manages the cluster lifecycle.
                type: string
              kubernetesVersion:
                description: |-
                  KubernetesVersion is the Kubernetes version for this cluster. Set from
                  bootstrap.kubernetesVersion or derived automatically from the Talos version
                  support matrix when not explicitly provided. Informational — upgrade CRs
                  (UpgradePolicy with UpgradeTypeKubernetes) govern the actual k8s version.
                type: string
              lineage:
                description: Lineage is the sealed causal chain record for this root
                  declaration. Immutable after creation.
                properties:
                  creatingOperator:
                    description: |-
                      CreatingOperator identifies the Seam Operator that created this object.
                      This is a structured identity carrying the operator name and its deployed
                      version at creation time.
                    properties:
                      name:
                        description: |-
                          Name is the canonical name of the Seam Operator (e.g., platform, guardian,
                          wrapper, conductor).
                        type: string
                      version:
                        description: |-
                          Version is the deployed version of the operator at the time the object was
                          created (e.g., v1.26.5-r3). This allows audit tooling to correlate objects
                          with the operator version that produced them.
                        type: string
                    required:
                    - name
                    - version
                    type: object
                  creationRationale:
                    description: |-
                      CreationRationale is the reason this object was created, drawn from the
                      Seam Core controlled vocabulary defined in rationale.go. It is not a
                      free-text field.
                    enum:
                    - ClusterProvision
                    - ClusterDecommission
                    - SecurityEnforcement
                    - PackExecution
                    - VirtualizationFulfillment
                    - ConductorAssignment
                    - VortexBinding
                    type: string
                  rootGenerationAtCreation:
                    description: |-
                      RootGenerationAtCreation is the metadata.generation of the root declaration
                      at the time this object was created. Together with RootUID, it provides a
                      complete temporal anchor for the derivation record.
