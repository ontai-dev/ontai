                      type: string
                    name:
                      description: Name is the step identifier within the capability.
                      type: string
                    startedAt:
                      description: StartedAt is the time this step began execution.
                      format: date-time
                      type: string
                    status:
                      allOf:
                      - enum:
                        - Succeeded
                        - Failed
                      - enum:
                        - Succeeded
                        - Failed
                      description: Status is the terminal status of this step.
                      type: string
                  required:
                  - name
                  - status
                  type: object
                type: array
              talosClusterOperationResultRef:
                description: |-
                  TalosClusterOperationResultRef is reserved for future cross-reference to a
                  TalosCluster-scoped OperationResult. Stub field; not populated by any current controller.
                type: string
              targetClusterRef:
                description: TargetClusterRef is the name of the target cluster this
                  operation ran against.
                type: string
            required:
            - capability
            - status
            type: object
          status:
            description: |-
              PackOperationResultStatus is the observed state of a PackOperationResult.
