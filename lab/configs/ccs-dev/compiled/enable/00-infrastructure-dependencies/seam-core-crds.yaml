                type: string
              phase:
                description: Phase identifies the RunnerConfig phase this result belongs
                  to.
                type: string
              previousRevisionRef:
                description: |-
                  PreviousRevisionRef is the name of the PackOperationResult CR deleted when
                  this revision was written. Enables chain reconstruction for the full operation history.
                  Absent for revision 1 (no predecessor).
                type: string
              revision:
                description: |-
                  Revision is the monotonically increasing revision counter for this pack operation
                  sequence. Incremented each time a new result supersedes the previous one.
                format: int64
                type: integer
              startedAt:
                description: StartedAt is the time the capability execution began.
                format: date-time
                type: string
              status:
                allOf:
                - enum:
                  - Succeeded
                  - Failed
                - enum:
                  - Succeeded
                  - Failed
                description: Status is the terminal status of the capability execution.
                type: string
              steps:
