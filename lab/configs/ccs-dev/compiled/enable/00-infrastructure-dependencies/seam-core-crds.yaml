                  - name
                  type: object
                type: array
              failureReason:
                description: FailureReason is populated when Status is Failed. Nil
                  on success.
                properties:
                  category:
                    description: Category classifies the failure domain.
                    enum:
                    - ValidationFailure
                    - CapabilityUnavailable
                    - ExecutionFailure
                    - ExternalDependencyFailure
                    - InvariantViolation
                    - LicenseViolation
                    - StorageUnavailable
                    type: string
