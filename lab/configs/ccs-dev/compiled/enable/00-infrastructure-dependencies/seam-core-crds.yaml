    listKind: InfrastructureRunnerConfigList
    plural: infrastructurerunnerconfigs
    shortNames:
    - irc
    singular: infrastructurerunnerconfig
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.clusterRef
      name: Cluster
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          InfrastructureRunnerConfig is the seam-core CRD for Conductor agent runtime configuration.
          Owned by seam-core; authored exclusively by the platform operator. INV-009.
          conductor-schema.md.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
