            - targetClusterRef
            type: object
          status:
            description: InfrastructurePackReceiptStatus is the observed state of
              an InfrastructurePackReceipt.
            properties:
              conditions:
                description: Conditions is the list of status conditions for this
                  PackReceipt.
                items:
