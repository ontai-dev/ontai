# Seam Core CRD Definitions (infrastructure.ontai.dev)
# SC-INV-003: seam-core CRDs must be installed before all operators.
# Source: seam-core/config/crd/
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.1
  name: driftsignals.infrastructure.ontai.dev
spec:
  group: infrastructure.ontai.dev
  names:
    kind: DriftSignal
    listKind: DriftSignalList
    plural: driftsignals
    shortNames:
    - ds
    singular: driftsignal
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.state
      name: State
      type: string
    - jsonPath: .spec.correlationID
      name: CorrelationID
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          DriftSignal is the seam-core CRD for the three-state drift acknowledgement chain.
          Written by conductor role=tenant; acknowledged by conductor role=management.
          Decision I. At-least-once delivery. Human-at-Boundary invariant enforced via
          configurable escalation threshold and TerminalDrift Condition. conductor-schema.md.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              DriftSignalSpec defines the observed drift event written by conductor role=tenant.
              Decision I. conductor-schema.md.
            properties:
              affectedCRRef:
                description: AffectedCRRef is a typed reference to the CR that exhibited
                  drift.
                properties:
                  group:
                    description: Group is the API group of the drifted CR.
                    type: string
                  kind:
                    description: Kind is the Kind of the drifted CR.
                    type: string
                  name:
                    description: Name is the name of the drifted CR.
                    type: string
                  namespace:
                    description: Namespace is the namespace of the drifted CR. Empty
                      for cluster-scoped resources.
                    type: string
                required:
                - group
                - kind
                - name
                type: object
              correctionJobRef:
                description: |-
                  CorrectionJobRef is the name of the corrective Job created by the management cluster.
                  Populated when state transitions to queued.
                type: string
              correlationID:
                description: |-
                  CorrelationID is a unique identifier for this drift event, used to deduplicate
                  signals across federation retries. Format: UUID v4.
                type: string
              driftReason:
                description: DriftReason is a human-readable description of why drift
                  was detected.
                type: string
              escalationCounter:
                description: |-
                  EscalationCounter is the number of times this signal has been re-emitted without
                  acknowledgement. Incremented by conductor role=tenant on each re-emit cycle.
                  When this counter reaches the configurable escalation threshold, conductor writes a
                  type=TerminalDrift Condition on the affected CR and stops re-emitting. Decision I.
                format: int32
                type: integer
              observedAt:
                description: ObservedAt is the time the drift was first observed by
                  conductor role=tenant.
                format: date-time
                type: string
              state:
                allOf:
                - enum:
                  - pending
                  - delivered
                  - queued
                  - confirmed
                - enum:
                  - pending
                  - delivered
                  - queued
                  - confirmed
                description: State is the current acknowledgement state of this drift
                  signal. Decision I.
                type: string
            required:
            - affectedCRRef
            - correlationID
            - driftReason
            - observedAt
            - state
            type: object
          status:
            description: DriftSignalStatus is the observed state of a DriftSignal.
              Written by conductor role=management.
            properties:
              conditions:
                description: Conditions is the list of status conditions for this
                  DriftSignal.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                description: ObservedGeneration is the generation most recently reconciled.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.1
  name: infrastructureclusterpacks.infrastructure.ontai.dev
spec:
  group: infrastructure.ontai.dev
  names:
    kind: InfrastructureClusterPack
    listKind: InfrastructureClusterPackList
    plural: infrastructureclusterpacks
    shortNames:
    - icp
    singular: infrastructureclusterpack
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.version
      name: Version
      type: string
    - jsonPath: .status.signed
      name: Signed
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          InfrastructureClusterPack is the seam-core CRD for pack registration.
          Records an OCI artifact that has been compiled and is ready for runtime delivery.
          Spec is immutable after creation. wrapper-schema.md §3.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              InfrastructureClusterPackSpec defines the desired state of an InfrastructureClusterPack.
              All fields are immutable after creation. wrapper-schema.md §3.
            properties:
              basePackName:
                description: BasePackName is the logical pack name shared across versions
                  (e.g., "nginx-ingress").
                type: string
              chartName:
                description: ChartName is the name of the Helm chart used to compile
                  this pack.
                type: string
              chartURL:
                description: ChartURL is the URL of the Helm chart repository used
                  to compile this pack.
                type: string
              chartVersion:
                description: ChartVersion is the version of the Helm chart used to
                  compile this pack.
                type: string
              checksum:
                description: Checksum is the content-addressed checksum of the full
                  artifact manifest set.
                type: string
              clusterScopedDigest:
                description: |-
                  ClusterScopedDigest is the OCI digest of the cluster-scoped non-RBAC layer.
                  Applied after guardian RBAC intake and before workload manifests. wrapper-schema.md §4.
                type: string
              executionOrder:
                description: ExecutionOrder defines the ordered stages in which pack
                  manifests are applied.
                items:
                  description: InfrastructurePackExecutionStage is a single stage
                    in the pack execution order.
                  properties:
                    manifests:
                      description: Manifests is the list of manifest names to apply
                        in this stage.
                      items:
                        type: string
                      type: array
                    name:
                      description: 'Name is the stage name. Must be one of: rbac,
                        storage, stateful, stateless.'
                      enum:
                      - rbac
                      - storage
                      - stateful
                      - stateless
                      type: string
                  required:
                  - name
                  type: object
                type: array
              helmVersion:
                description: HelmVersion is the version of the Helm SDK used to render
                  this pack.
                type: string
              lifecyclePolicies:
                description: LifecyclePolicies controls artifact retention behavior.
                properties:
                  retainOnDeletion:
                    default: true
                    description: |-
                      RetainOnDeletion controls whether the OCI artifact is retained when the
                      ClusterPack CR is deleted. Default: true (artifact retained).
                    type: boolean
                type: object
              lineage:
                description: |-
                  Lineage is the sealed causal chain record for this root declaration.
                  Authored once at object creation time and immutable thereafter.
                  seam-core-schema.md §5, CLAUDE.md §14 Decision 1.
                properties:
                  creatingOperator:
                    description: |-
                      CreatingOperator identifies the Seam Operator that created this object.
                      This is a structured identity carrying the operator name and its deployed
                      version at creation time.
                    properties:
                      name:
                        description: |-
                          Name is the canonical name of the Seam Operator (e.g., platform, guardian,
                          wrapper, conductor).
                        type: string
                      version:
                        description: |-
                          Version is the deployed version of the operator at the time the object was
                          created (e.g., v1.26.5-r3). This allows audit tooling to correlate objects
                          with the operator version that produced them.
                        type: string
                    required:
                    - name
                    - version
                    type: object
                  creationRationale:
                    description: |-
                      CreationRationale is the reason this object was created, drawn from the
                      Seam Core controlled vocabulary defined in rationale.go. It is not a
                      free-text field.
                    enum:
                    - ClusterProvision
                    - ClusterDecommission
                    - SecurityEnforcement
                    - PackExecution
                    - VirtualizationFulfillment
                    - ConductorAssignment
                    - VortexBinding
                    type: string
                  rootGenerationAtCreation:
                    description: |-
                      RootGenerationAtCreation is the metadata.generation of the root declaration
                      at the time this object was created. Together with RootUID, it provides a
                      complete temporal anchor for the derivation record.
                    format: int64
                    type: integer
                  rootKind:
                    description: |-
                      RootKind is the kind of the root declaration that caused this object to
                      exist (e.g., TalosCluster, PackExecution, RBACPolicy).
                    type: string
                  rootName:
                    description: RootName is the name of the root declaration.
                    type: string
                  rootNamespace:
                    description: RootNamespace is the namespace of the root declaration.
                    type: string
                  rootUID:
                    description: |-
                      RootUID is the UID of the root declaration at the time this object was
                      created. Used to verify that no root declaration replacement has occurred.
                    type: string
                required:
                - creatingOperator
                - creationRationale
                - rootGenerationAtCreation
                - rootKind
                - rootName
                - rootNamespace
                - rootUID
                type: object
              provenance:
                description: Provenance records build-time metadata for audit and
                  traceability.
                properties:
                  buildID:
                    description: BuildID is the CI/CD build identifier that produced
                      this pack.
                    type: string
                  buildTimestamp:
                    description: BuildTimestamp is when the pack artifact was produced.
                    format: date-time
                    type: string
                  sourceRef:
                    description: SourceRef is the git reference (commit SHA or tag)
                      from which the pack was built.
                    type: string
                type: object
              rbacDigest:
                description: |-
                  RBACDigest is the OCI digest of the RBAC layer of this ClusterPack artifact.
                  Contains ServiceAccount, Role, ClusterRole, RoleBinding, ClusterRoleBinding manifests.
                type: string
              registryRef:
                description: RegistryRef identifies the OCI artifact for this pack.
                  Immutable after creation.
                properties:
                  digest:
                    description: Digest is the OCI image digest (e.g., sha256:abc123...).
                      Immutable after creation.
                    type: string
                  url:
                    description: URL is the OCI registry URL including image name.
                    type: string
                required:
                - digest
                - url
                type: object
              sourceBuildRef:
                description: SourceBuildRef is an opaque reference to the build that
                  produced this pack. Informational.
                type: string
              targetClusters:
                description: TargetClusters is the list of cluster names to which
                  this ClusterPack should be delivered.
                items:
                  type: string
                type: array
              valuesFile:
                description: |-
                  ValuesFile is the path to the values file used during pack compilation.
                  For Helm packs: the user-supplied values file merged with chart defaults at render time.
                  For kustomize/raw packs: the overlay or patch file applied during the external build.
                  Informational -- recorded so admins can trace which customization produced this artifact.
                type: string
              version:
                description: Version is the semantic version of this pack. Immutable
                  after creation.
                type: string
              workloadDigest:
                description: |-
                  WorkloadDigest is the OCI digest of the workload layer of this ClusterPack artifact.
                  Applied after guardian RBACProfile reaches provisioned=true. wrapper-schema.md §4.
                type: string
            required:
            - registryRef
            - version
            type: object
          status:
            description: InfrastructureClusterPackStatus is the observed state of
              an InfrastructureClusterPack.
            properties:
              conditions:
                description: Conditions is the list of status conditions for this
                  ClusterPack.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                description: ObservedGeneration is the generation most recently reconciled.
                format: int64
                type: integer
              packSignature:
                description: PackSignature is the base64-encoded Ed25519 signature
                  produced by the management cluster conductor.
                type: string
              signed:
                description: Signed indicates whether the conductor signing loop has
                  signed this pack.
                type: boolean
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.1
  name: infrastructurelineageindices.infrastructure.ontai.dev
spec:
  group: infrastructure.ontai.dev
  names:
    kind: InfrastructureLineageIndex
    listKind: InfrastructureLineageIndexList
    plural: infrastructurelineageindices
    shortNames:
    - ili
    singular: infrastructurelineageindex
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.rootBinding.rootKind
      name: RootKind
      type: string
    - jsonPath: .spec.rootBinding.rootName
      name: RootName
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          InfrastructureLineageIndex is the sealed causal chain index for a root
          declaration in the Seam infrastructure domain. It instantiates the abstract
          DomainLineageIndex schema from core.ontai.dev.

          One InfrastructureLineageIndex is created per root declaration by the
          InfrastructureLineageController. All derived objects carry a reference to their
          root's index; they do not carry their own index instances.
          Lineage Index Pattern — seam-core-schema.md §3.
          Controller-authored exclusively — CLAUDE.md §14 Decision 3.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: InfrastructureLineageIndexSpec is the spec of an InfrastructureLineageIndex.
            properties:
              descendantRegistry:
                description: |-
                  DescendantRegistry is the list of all objects derived from the root
                  declaration. Appended monotonically as new derived objects are created.
                  Entries are never modified or removed.
                items:
                  description: |-
                    DescendantEntry records a single derived object in the lineage index.
                    Entries are appended monotonically. An entry is never modified or removed
                    except by the retention enforcement loop (which removes stale entries after
                    the retention window elapses).
                  properties:
                    actorRef:
                      description: |-
                        ActorRef is the identity propagated from rootBinding.declaringPrincipal.
                        Every derived object entry carries the initiating human principal from the
                        root of its causal chain. Immutable.
                      type: string
                    createdAt:
                      description: |-
                        CreatedAt is the time this descendant entry was appended to the registry.
                        Used by the retention enforcement loop to determine when a stale entry
                        (referenced object no longer exists) has exceeded its retention window.
                      format: date-time
                      type: string
                    creationRationale:
                      allOf:
                      - enum:
                        - ClusterProvision
                        - ClusterDecommission
                        - SecurityEnforcement
                        - PackExecution
                        - VirtualizationFulfillment
                        - ConductorAssignment
                        - VortexBinding
                      - enum:
                        - ClusterProvision
                        - ClusterDecommission
                        - SecurityEnforcement
                        - PackExecution
                        - VirtualizationFulfillment
                        - ConductorAssignment
                        - VortexBinding
                      description: |-
                        CreationRationale is the reason this derived object was created, drawn from
                        the Seam Core controlled vocabulary (pkg/lineage.CreationRationale).
                      type: string
                    group:
                      description: Group is the API group of the derived object (e.g.,
                        platform.ontai.dev).
                      type: string
                    kind:
                      description: Kind is the kind of the derived object.
                      type: string
                    name:
                      description: Name is the name of the derived object.
                      type: string
                    namespace:
                      description: Namespace is the namespace of the derived object.
                      type: string
                    rootGenerationAtCreation:
                      description: |-
                        RootGenerationAtCreation is the metadata.generation of the root declaration
                        at the time this derived object was created.
                      format: int64
                      type: integer
                    seamOperator:
                      description: |-
                        SeamOperator is the name of the Seam Operator that created this derived
                        object (e.g., platform, guardian, wrapper, conductor).
                      type: string
                    uid:
                      description: UID is the UID of the derived object.
                      type: string
                    version:
                      description: Version is the API version of the derived object
                        (e.g., v1alpha1).
                      type: string
                  required:
                  - creationRationale
                  - group
                  - kind
                  - name
                  - namespace
                  - rootGenerationAtCreation
                  - seamOperator
                  - uid
                  - version
                  type: object
                type: array
              domainRef:
                description: |-
                  DomainRef references the DomainLineageIndex at core.ontai.dev that
                  this InfrastructureLineageIndex instantiates. This is the formal
                  traceability link from the infrastructure domain to the domain core.
                  Format: {name}.{group} — e.g. "infrastructure.core.ontai.dev"
                  Set by the InfrastructureLineageController on creation. Validated by the
                  admission webhook: when present, must equal "infrastructure.core.ontai.dev".
                type: string
              outcomeRegistry:
                description: |-
                  OutcomeRegistry is the append-only registry of terminal outcomes for derived
                  objects tracked in DescendantRegistry. Entries are appended by LineageController
                  when a terminal condition is observed on a tracked derived object. Entries are
                  never modified or removed. An outcomeRegistry entry supersedes but does not
                  replace its corresponding DescendantRegistry entry.
                items:
                  description: |-
                    OutcomeEntry records the terminal outcome for a derived object tracked in
                    DescendantRegistry. Entries are appended by LineageController when a terminal
                    condition is observed. Entries are never modified or removed.
                  properties:
                    derivedObjectUID:
                      description: DerivedObjectUID is the UID matching a derived
                        object entry in DescendantRegistry.
                      type: string
                    outcomeDetail:
                      description: |-
                        OutcomeDetail is a brief human-readable summary of the outcome written by
                        LineageController from the terminal condition message. Optional.
                      type: string
                    outcomeRef:
                      description: |-
                        OutcomeRef is the name of the OperationResult ConfigMap or terminal condition
                        reason that produced this outcome classification. Optional.
                      type: string
                    outcomeTimestamp:
                      description: OutcomeTimestamp is the time when the terminal
                        condition was observed.
                      format: date-time
                      type: string
                    outcomeType:
                      description: OutcomeType is the terminal classification of the
                        derived object lifecycle.
                      enum:
                      - Succeeded
                      - Failed
                      - Drifted
                      - Superseded
                      type: string
                  required:
                  - derivedObjectUID
                  - outcomeTimestamp
                  - outcomeType
                  type: object
                type: array
              policyBindingStatus:
                description: |-
                  PolicyBindingStatus records the InfrastructurePolicy and InfrastructureProfile
                  bound to the root declaration at last evaluation.
                properties:
                  domainPolicyRef:
                    description: |-
                      DomainPolicyRef is the name of the InfrastructurePolicy bound to the root
                      declaration.
                    type: string
                  domainProfileRef:
                    description: |-
                      DomainProfileRef is the name of the InfrastructureProfile bound to the
                      root declaration.
                    type: string
                  driftDetected:
                    description: |-
                      DriftDetected is true if the controller detected drift between the expected
                      state derived from the InfrastructurePolicy and the observed state of
                      derived objects at the last evaluation.
                    type: boolean
                  policyGenerationAtLastEvaluation:
                    description: |-
                      PolicyGenerationAtLastEvaluation is the metadata.generation of the bound
                      InfrastructurePolicy at the time of the last policy evaluation cycle.
                    format: int64
                    type: integer
                type: object
              retentionPolicy:
                description: |-
                  RetentionPolicy declares garbage collection behavior for this index and its
                  stale descendant entries. If absent, controller defaults apply
                  (descendantRetentionDays=30, deleteWithRoot=true).
                properties:
                  deleteWithRoot:
                    default: true
                    description: |-
                      DeleteWithRoot controls whether this InfrastructureLineageIndex is garbage
                      collected when its root declaration is deleted. When true the LineageController
                      adds an ownerReference from the index to the root declaration, causing
                      Kubernetes garbage collection to cascade deletion automatically.

                      Defaults to true.
                    type: boolean
                  descendantRetentionDays:
                    default: 30
                    description: |-
                      DescendantRetentionDays is the number of days a stale descendant entry is
                      retained after its referenced object is confirmed not-found in the API server.
                      After this window elapses the LineageController prunes the entry from the
                      DescendantRegistry.

                      Defaults to 30. Minimum is 1.
                    format: int32
                    minimum: 1
                    type: integer
                type: object
              rootBinding:
                description: |-
                  RootBinding records the root declaration that anchors this lineage index.
                  Immutable after admission. The admission webhook rejects any update that
                  modifies a field in this section.
                properties:
                  declaringPrincipal:
                    description: |-
                      DeclaringPrincipal is the identity of the human operator or automation
                      principal that applied the root declaration CR. Stamped by the admission
                      webhook via annotation infrastructure.ontai.dev/declaring-principal at
                      CREATE time. Immutable after rootBinding is sealed.
                    type: string
